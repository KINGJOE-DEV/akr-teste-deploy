kind: pipeline
type: docker
name: deploy


steps:
  - name: Build e Push da Imagem Docker
    image: docker:latest
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    commands:
      # 1. Faz o build já "carimbando" a imagem com o endereço do registry
      - docker build -t repositorio-imagem.akrbrands.com.br/teste_deploy:latest .
      # 2. Envia a imagem para o registry local do Swarm
      - docker push repositorio-imagem.akrbrands.com.br/teste_deploy:latest

  - name: Subir Serviço no Docker Swarm
    image: docker:latest
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    commands:
      # Não é recomendado remover o serviço (rm) antes do deploy em produção, 
      # pois causa indisponibilidade. O stack deploy já atualiza a imagem automaticamente!
      - docker stack deploy -c Docker-compose.yml app --with-registry-auth