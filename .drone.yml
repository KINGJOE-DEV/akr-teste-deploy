kind: pipeline
type: docker
name: deploy


steps:
  - name: Build e Push da Imagem Docker
    image: docker:latest
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    commands:
      - docker stack deploy -c Docker-compose.yml app --with-registry-auth
      # Força o serviço a baixar a imagem mais recente do registry e reiniciar as réplicas
      - docker service update --force --image repositorio-imagem.akrbrands.com.br/teste_deploy:latest app_teste_deploy


  - name: Subir Serviço no Docker Swarm
    image: docker:latest
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    commands:
      # Não é recomendado remover o serviço (rm) antes do deploy em produção, 
      # pois causa indisponibilidade. O stack deploy já atualiza a imagem automaticamente!
      - docker stack deploy -c Docker-compose.yml app --with-registry-auth