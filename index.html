<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Deploy</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 100px;
            background: #121212;
            color: #ffffff;
            margin: 0;
        }

        .container {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: inline-block;
            border: 1px solid #333;
        }

        h1 {
            color: #4CAF50;
            margin-top: 0;
            font-size: 2.5rem;
        }

        .server-info {
            background: #2d2d2d;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 1.2rem;
            margin-top: 20px;
            border-left: 5px solid #4CAF50;
        }

        .server-name {
            color: #64B5F6;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 TESTE DEPLOY</h1>
        <p>A aplicação está funcionando corretamente.</p>

        <div class="server-info">

            <span class="server-name">HOSTNAME_PLACEHOLDER</span>

</html>
